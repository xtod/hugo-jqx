baseURL = 'https://0x8.net/'
title = 'black8'
theme = 'jqx'
paginate = 5

languageCode = 'zh-cn'       
defaultContentLanguage = 'zh-cn'
locale = 'zh-cn'               

[params]
    mainSections = ["post"]
    description = "jqx的个人博客，分享技术、阅读与思考"
    featuredImage = true                                     

[[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

[[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true

[taxonomies]
    tag = "tags"
    category = "categories"
    series = "series"          

[outputs]
    home = ["HTML", "RSS"]
    section = ["HTML", "RSS"]
    taxonomy = ["HTML", "RSS"]
    term = ["HTML", "RSS"]

[params.seo]
    enableRobots = true

[minify]
    disableXML = false  
    minifyOutput = true